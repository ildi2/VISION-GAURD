# scripts/rollout/stage3_relaxed.yaml
# PHASE 9 - STAGE 3: Relaxed Guards (Week 3)
# Relax thresholds to production targets for better identity persistence
# Duration: 1 week
# Risk: Medium (increased carry rate, monitor for false positives)

chimeric:
  description: "GPS-like identity continuity (face assigns, tracking carries)"
  
  # STAGE 3: Real mode with production thresholds
  mode: "continuity"  # REAL MODE (GPS carry enabled)
  
  continuity:
    # Real mode
    shadow_mode: false
    
    # Metrics logging (normal frequency)
    shadow_metrics_log_interval_sec: 30
    
    # ============================================================
    # GUARD 1: Track Stability (PRODUCTION)
    # ============================================================
    min_track_age_frames: 10  # Production target
    # Rationale: Balanced stability (not too strict, not too loose)
    
    # ============================================================
    # GUARD 2c: Track Health (PRODUCTION)
    # ============================================================
    min_track_confidence: 0.3  # Production target
    max_lost_frames: 5  # Production target
    # Rationale: Allow brief tracking hiccups without breaking continuity
    
    # ============================================================
    # GUARD 2: Appearance Consistency (PRODUCTION)
    # ============================================================
    appearance_distance_threshold: 0.35  # Production target
    # Rationale: Allows natural variation (lighting, angle) while preventing person switches
    appearance_safe_zone_frames: 30
    appearance_ema_alpha: 0.1
    
    # ============================================================
    # GUARD 2b: BBox Stability (PRODUCTION)
    # ============================================================
    max_bbox_displacement_fraction: 0.25  # Production target
    max_bbox_displacement_px: 600  # Production target
    bbox_iou_threshold: 0.3  # Production target
    # Rationale: Allows natural movement while detecting teleports
    
    # ============================================================
    # GUARD 3: Face Consistency (PRODUCTION)
    # ============================================================
    max_face_contradiction_count: 3  # Production target
    # Rationale: Tolerates brief face mismatches (angles, occlusion) before breaking
    
    # ============================================================
    # GRACE REATTACHMENT (STILL DISABLED in Stage 3)
    # ============================================================
    grace_window_seconds: 0.0  # DISABLED (enable in Stage 4)
    # Rationale: Validate core carry at production thresholds before adding grace

# Monitoring objectives for Stage 3:
# 1. Validate production thresholds:
#    - Identity persistence ≥95% (primary success metric)
#    - False carry rate <1% (safety metric)
#    - No increase in system errors vs Stage 2
#
# 2. Compare with Stage 2 (strict guards):
#    - Carry rate increase (expected, desired)
#    - Guard break rate decrease (fewer false breaks)
#    - False carry rate stable (critical safety check)
#
# 3. Tune if needed:
#    - If false carry rate >1% → tighten appearance_distance_threshold
#    - If identity persistence <95% → review guard break logs
#
# 4. Success criteria:
#    - Metrics meet targets (persistence ≥95%, false carry <1%)
#    - User feedback positive (operators prefer continuity over classic)
#    - System stable for 1 week continuous operation
#    - Ready for grace reattachment (Stage 4)
